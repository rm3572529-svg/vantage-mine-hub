kind = "web"
previewPath = "/"
title = "Vantage Mine Hub"
version = "1.0.0"
id = "artifacts/vantage-mine-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25814

[services.development]
run = "pnpm --filter @workspace/vantage-mine-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vantage-mine-hub", "run", "build" ]
publicDir = "artifacts/vantage-mine-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25814"
BASE_PATH = "/"
